name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🛠️ 自动化构建与修复
        run: |
          # 自动定位项目根目录（寻找 package.json）
          PACKAGE_JSON_PATH=$(find . -name "package.json" -not -path "*/node_modules/*" | head -n 1)
          if [ -z "$PACKAGE_JSON_PATH" ]; then
            echo "错误: 在仓库中找不到 package.json 文件！"
            exit 1
          fi
          PROJECT_ROOT=$(dirname "$PACKAGE_JSON_PATH")
          echo "检测到项目目录: $PROJECT_ROOT"
          cd "$PROJECT_ROOT"
          
          # 1. 安装依赖并构建网页端
          npm install
          npm run build
          
          # 2. 初始化安卓环境
          rm -rf android
          npm install @capacitor/cli @capacitor/core @capacitor/android
          npx cap init "自种自收" "com.zizhongzishou.app" --web-dir dist
          npx cap add android
          
          # 3. 修复 Kotlin 版本兼容性
          sed -i 's/kotlin_version = .*/kotlin_version = "1.9.10"/' android/build.gradle
          
          # 4. 注入安卓权限（逐行注入，最安全）
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/android.permission.INTERNET/a \    <uses-permission android:name="android.permission.CAMERA" />' $MANIFEST
          sed -i '/android.permission.CAMERA/a \    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />' $MANIFEST
          sed -i '/android.permission.ACCESS_NETWORK_STATE/a \    <uses-permission android:name="android.permission.ACCESS_WIFI_STATE" />' $MANIFEST
          sed -i '/android.permission.ACCESS_WIFI_STATE/a \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' $MANIFEST
          sed -i '/android.permission.READ_EXTERNAL_STORAGE/a \    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' $MANIFEST
          
          # 5. 设置自动递增的版本号
          VERSION_CODE=${{ github.run_number }}
          VERSION_NAME="1.0.${{ github.run_number }}"
          
          # 6. 注入版本号配置
          cat <<EOF > android/app/build.gradle.tmp
          apply plugin: 'com.android.application'
          android {
              namespace "com.zizhongzishou.app"
              compileSdkVersion 34
              defaultConfig {
                  applicationId "com.zizhongzishou.app"
                  minSdkVersion 22
                  targetSdkVersion 34
                  versionCode $VERSION_CODE
                  versionName "$VERSION_NAME"
              }
              configurations.all {
                  resolutionStrategy {
                      force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.10'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.10'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.10'
                  }
              }
          }
          EOF
          cat android/app/build.gradle >> android/app/build.gradle.tmp
          mv android/app/build.gradle.tmp android/app/build.gradle
          
          npx cap copy
          
      - name: 设置 Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '21'
          
      - name: 🚀 生成 Release APK
        run: |
          # 再次确保进入正确的目录执行安卓构建
          PACKAGE_JSON_PATH=$(find . -name "package.json" -not -path "*/node_modules/*" | head -n 1)
          PROJECT_ROOT=$(dirname "$PACKAGE_JSON_PATH")
          cd "$PROJECT_ROOT/android"
          chmod +x gradlew
          ./gradlew clean assembleRelease --no-daemon

      - name: 🔐 签名 APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: |
            $(find . -name "package.json" -not -path "*/node_modules/*" | head -n 1 | xargs dirname)/android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: 📦 导出正式版安装包
        uses: actions/upload-artifact@v4
        with:
          name: 自种自收-正式版-V${{ github.run_number }}
          path: ${{steps.sign_app.outputs.signedReleaseFile}}
