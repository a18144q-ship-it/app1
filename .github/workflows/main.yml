name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 🛠️ 自动化构建与修复
        id: prep
        run: |
          PACKAGE_JSON_PATH=$(find . -name "package.json" -not -path "*/node_modules/*" | head -n 1)
          PROJECT_ROOT=$(dirname "$PACKAGE_JSON_PATH")
          echo "PROJECT_ROOT=$PROJECT_ROOT" >> $GITHUB_ENV
          
          cd "$PROJECT_ROOT"
          npm install
          npm run build
          
          rm -f capacitor.config.ts
          rm -f capacitor.config.json
          rm -rf android
          
          npm install @capacitor/cli @capacitor/core @capacitor/android
          npx cap init "自种自收" "com.zizhongzishou.app" --web-dir dist
          npx cap add android
          
          sed -i 's/kotlin_version = .*/kotlin_version = "1.9.10"/' android/build.gradle
          
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/android.permission.INTERNET/a \    <uses-permission android:name="android.permission.CAMERA" />' $MANIFEST
          sed -i '/android.permission.CAMERA/a \    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />' $MANIFEST
          sed -i '/android.permission.ACCESS_NETWORK_STATE/a \    <uses-permission android:name="android.permission.ACCESS_WIFI_STATE" />' $MANIFEST
          sed -i '/android.permission.ACCESS_WIFI_STATE/a \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' $MANIFEST
          sed -i '/android.permission.READ_EXTERNAL_STORAGE/a \    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' $MANIFEST
          
          VERSION_CODE=${{ github.run_number }}
          VERSION_NAME="1.0.${{ github.run_number }}"
          
          cat <<EOF > android/app/build.gradle.tmp
          apply plugin: 'com.android.application'
          android {
              namespace "com.zizhongzishou.app"
              compileSdkVersion 34
              defaultConfig {
                  applicationId "com.zizhongzishou.app"
                  minSdkVersion 22
                  targetSdkVersion 34
                  versionCode $VERSION_CODE
                  versionName "$VERSION_NAME"
              }
              configurations.all {
                  resolutionStrategy {
                      force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.10'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.10'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.10'
                  }
              }
          }
          EOF
          cat android/app/build.gradle >> android/app/build.gradle.tmp
          mv android/app/build.gradle.tmp android/app/build.gradle
          
          npx cap copy
          
      - name: 设置 Java 21 (恢复为 21，解决编译报错)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          
      - name: 🚀 生成 Release APK
        run: |
          cd ${{ env.PROJECT_ROOT }}/android
          chmod +x gradlew
          # 增加 --stacktrace 参数，如果报错能看到具体原因
          ./gradlew clean assembleRelease --no-daemon --stacktrace

      - name: 🔧 修复 Keystore 格式问题 (解决 Tag number over 30)
        run: |
          # 这一步是关键！我们将你提供的 Base64 转换回 keystore 文件，
          # 然后使用 keytool 将其转换为更兼容的 PKCS12 格式，避免签名工具报错。
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > old.keystore
          keytool -importkeystore -srckeystore old.keystore -srcstorepass "${{ secrets.KEYSTORE_PASSWORD }}" -destkeystore release.keystore -deststoretype pkcs12 -deststorepass "${{ secrets.KEYSTORE_PASSWORD }}" -destkeypass "${{ secrets.KEY_PASSWORD }}"
          
          # 将新格式的 keystore 重新编码为 Base64，存入环境变量供下一步使用
          NEW_BASE64=$(base64 -w 0 release.keystore)
          echo "NEW_KEYSTORE_BASE64=$NEW_BASE64" >> $GITHUB_ENV
          
          # 确定未签名 APK 的路径
          UNSIGNED_APK=$(find ${{ env.PROJECT_ROOT }}/android/app/build/outputs/apk/release -name "*-unsigned.apk" | head -n 1)
          RELEASE_DIR=$(dirname "$UNSIGNED_APK")
          echo "RELEASE_DIR=$RELEASE_DIR" >> $GITHUB_ENV

      - name: 🔐 签名 APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: ${{ env.RELEASE_DIR }}
          # 使用刚才转换好的新格式 Base64
          signingKeyBase64: ${{ env.NEW_KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: 📦 导出正式版安装包
        uses: actions/upload-artifact@v4
        with:
          name: 自种自收-正式版-V${{ github.run_number }}
          path: ${{steps.sign_app.outputs.signedReleaseFile}}
