name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 自动寻找项目并建造
        run: |
          TARGET_DIR=$(find . -name "package.json" -not -path "*/node_modules/*" | head -n 1 | xargs dirname)
          echo "发现项目位于: $TARGET_DIR"
          cd "$TARGET_DIR"
          
          # 1. 安装并构建网页
          npm install
          npm run build
          
          # 2. 如果已经有安卓文件夹，彻底删掉重开（防止之前的缓存干扰）
          rm -rf android
          
          # 3. 重新初始化
          npm install @capacitor/cli @capacitor/core @capacitor/android
          npx cap init "MyLifeApp" "com.life.record" --web-dir dist
          npx cap add android
          
          # 4. 强制修复 Kotlin 依赖冲突（解决你截图里的报错）
          cd android
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          cd ..
          npx cap copy
          
      - name: 设置 Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '21'
          
      - name: 生成 APK
        run: |
          TARGET_DIR=$(find . -name "package.json" -not -path "*/node_modules/*" | head -n 1 | xargs dirname)
          cd "$TARGET_DIR/android"
          chmod +x gradlew
          # 使用强制刷新模式编译
          ./gradlew assembleDebug --stacktrace

      - name: 寻找并上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: My-App-Install-Package
          path: "**/app-debug.apk"
