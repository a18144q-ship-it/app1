name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 🛠️ 自动化构建与修复
        run: |
          PACKAGE_JSON_PATH=$(find . -name "package.json" -not -path "*/node_modules/*" | head -n 1)
          PROJECT_ROOT=$(dirname "$PACKAGE_JSON_PATH")
          echo "PROJECT_ROOT=$PROJECT_ROOT" >> $GITHUB_ENV
          
          cd "$PROJECT_ROOT"
          npm install
          npm run build
          rm -f capacitor.config.*
          rm -rf android
          npm install @capacitor/cli @capacitor/core @capacitor/android
          npx cap init "自种自收" "com.zizhongzishou.app" --web-dir dist
          npx cap add android
          
          sed -i 's/kotlin_version = .*/kotlin_version = "1.9.10"/' android/build.gradle
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/android.permission.INTERNET/a \    <uses-permission android:name="android.permission.CAMERA" />' $MANIFEST
          sed -i '/android.permission.CAMERA/a \    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />' $MANIFEST
          
          VERSION_CODE=${{ github.run_number }}
          cat <<EOF > android/app/build.gradle.tmp
          apply plugin: 'com.android.application'
          android {
              namespace "com.zizhongzishou.app"
              compileSdkVersion 34
              defaultConfig {
                  applicationId "com.zizhongzishou.app"
                  minSdkVersion 22
                  targetSdkVersion 34
                  versionCode $VERSION_CODE
                  versionName "1.0.$VERSION_CODE"
              }
          }
          EOF
          cat android/app/build.gradle >> android/app/build.gradle.tmp
          mv android/app/build.gradle.tmp android/app/build.gradle
          npx cap copy
          
      - name: 设置 Java 17 (更稳定)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: 🚀 生成未签名 APK
        run: |
          cd ${{ env.PROJECT_ROOT }}/android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: 🔐 手动签名 APK (官方工具链)
        run: |
          # 1. 解码签名文件
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore
          
          # 2. 找到生成的未签名 APK
          UNSIGNED_APK=$(find ${{ env.PROJECT_ROOT }}/android/app/build/outputs/apk/release -name "*-unsigned.apk" | head -n 1)
          
          # 3. 使用 apksigner 进行签名
          # 注意：这里直接使用 Android SDK 路径下的 apksigner
          /usr/local/lib/android/sdk/build-tools/34.0.0/apksigner sign \
            --ks release.keystore \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
            --out release-signed.apk \
            "$UNSIGNED_APK"
          
          echo "SIGNED_APK=release-signed.apk" >> $GITHUB_ENV

      - name: 📦 导出正式版安装包
        uses: actions/upload-artifact@v4
        with:
          name: 自种自收-正式版-V${{ github.run_number }}
          path: release-signed.apk
