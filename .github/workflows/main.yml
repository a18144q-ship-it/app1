name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 自动寻找项目并建造
        run: |
          TARGET_DIR=$(find . -name "package.json" -not -path "*/node_modules/*" | head -n 1 | xargs dirname)
          echo "发现项目位于: $TARGET_DIR"
          cd "$TARGET_DIR"
          npm install
          npm run build
          npm install @capacitor/cli @capacitor/core @capacitor/android
          # 如果 android 文件夹已存在则不重复 init
          if [ ! -d "android" ]; then
            npx cap init "MyLifeApp" "com.life.record" --web-dir dist
            npx cap add android
          fi
          npx cap copy
          
      - name: 设置 Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft' # 微软提供的 Java 21 分发版比较稳定
          java-version: '21'
          
      - name: 生成 APK
        run: |
          TARGET_DIR=$(find . -name "package.json" -not -path "*/node_modules/*" | head -n 1 | xargs dirname)
          cd "$TARGET_DIR/android"
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 寻找并上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: My-App-Install-Package
          path: "**/app-debug.apk"
