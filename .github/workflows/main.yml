name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🛠️ 暴力修复依赖并构建
        run: |
          # 1. 定位项目
          TARGET_DIR=$(find . -name "package.json" -not -path "*/node_modules/*" | head -n 1 | xargs dirname)
          cd "$TARGET_DIR"
          
          # 2. 网页端打包
          npm install
          npm run build
          
          # 3. 重建安卓环境
          rm -rf android
          npm install @capacitor/cli @capacitor/core @capacitor/android
          npx cap init "MyLifeApp" "com.life.record" --web-dir dist
          npx cap add android
          
          # 4. 【核心修复】强行改写安卓配置，解决 Duplicate Class 报错
          # 修改 build.gradle 强制指定 Kotlin 版本
          sed -i 's/kotlin_version = .*/kotlin_version = "1.9.10"/' android/build.gradle
          
          # 在 app/build.gradle 中强制排除冲突库
          cat <<EOF > android/app/build.gradle.tmp
          apply plugin: 'com.android.application'
          android {
              namespace "com.life.record"
              compileSdkVersion 34
              defaultConfig {
                  applicationId "com.life.record"
                  minSdkVersion 22
                  targetSdkVersion 34
                  versionCode 1
                  versionName "1.0"
              }
              configurations.all {
                  resolutionStrategy {
                      force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.10'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.10'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.10'
                  }
              }
          }
          EOF
          # 这一步是把修复逻辑注入到原本的配置中
          cat android/app/build.gradle >> android/app/build.gradle.tmp
          mv android/app/build.gradle.tmp android/app/build.gradle
          
          npx cap copy
          
      - name: 设置 Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '21'
          
      - name: 🚀 最后的冲刺：生成 APK
        run: |
          TARGET_DIR=$(find . -name "package.json" -not -path "*/node_modules/*" | head -n 1 | xargs dirname)
          cd "$TARGET_DIR/android"
          chmod +x gradlew
          # 使用清洗模式编译
          ./gradlew clean assembleDebug --no-daemon

      - name: 📦 导出安装包
        uses: actions/upload-artifact@v4
        with:
          name: My-App-Install-Package
          path: "**/app-debug.apk"
