name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 自动寻找项目并建造
        run: |
          # 1. 找到 package.json 所在的真正文件夹
          TARGET_DIR=$(find . -name "package.json" -not -path "*/node_modules/*" | head -n 1 | xargs dirname)
          echo "发现项目位于: $TARGET_DIR"
          cd "$TARGET_DIR"
          
          # 2. 安装依赖并构建网页
          npm install
          npm run build
          
          # 3. 安装 Capacitor 并配置安卓
          npm install @capacitor/cli @capacitor/core @capacitor/android
          # 这里会自动创建安卓项目
          npx cap init "MyLifeApp" "com.life.record" --web-dir dist
          npx cap add android
          npx cap copy
          
      - name: 设置 Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: 生成 APK
        run: |
          TARGET_DIR=$(find . -name "package.json" -not -path "*/node_modules/*" | head -n 1 | xargs dirname)
          cd "$TARGET_DIR/android"
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 寻找并上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: My-App-Install-Package
          # 自动寻找生成的 apk 文件路径
          path: "**/app-debug.apk"
